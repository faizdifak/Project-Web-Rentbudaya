<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informasi Akun - RentBudaya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FDF8F2;
            min-height: 100vh;
            position: relative;
        }

        .batik-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.04"><path fill="none" stroke="%23C8593A" stroke-width="0.8" d="M20,20 L30,15 L40,20 L50,15 L60,20 L70,15 L80,20 M20,30 L30,25 L40,30 L50,25 L60,30 L70,25 L80,30 M20,40 L30,35 L40,40 L50,35 L60,40 L70,35 L80,40 M20,50 L30,45 L40,50 L50,45 L60,50 L70,45 L80,50 M20,60 L30,55 L40,60 L50,55 L60,60 L70,55 L80,60 M20,70 L30,65 L40,70 L50,65 L60,70 L70,65 L80,70 M20,80 L30,75 L40,80 L50,75 L60,80 L70,75 L80,80"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: -1;
        }

        /* Navbar */
        .navbar {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #C8593A 0%, #8B3A2A 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-right a {
            text-decoration: none;
            color: #6B5B4F;
            font-weight: 500;
        }

        .profile-dropdown {
            position: relative;
        }

        .profile-btn {
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #2C1A0E;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-menu {
            position: absolute;
            right: 0;
            top: 40px;
            background: white;
            border-radius: 16px;
            width: 180px;
            padding: 8px 0;
            display: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .profile-menu a {
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            color: #2C1A0E;
            font-size: 14px;
        }

        .profile-menu a:hover {
            background: #FDF8F2;
        }

        .profile-dropdown:hover .profile-menu {
            display: block;
        }

        .logout {
            color: #DC2626 !important;
        }

        /* Main Content */
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #2C1A0E;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: #C8593A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .avatar i {
            font-size: 40px;
            color: white;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2C1A0E;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E8E0D8;
            border-radius: 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            background: #FDF8F2;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #C8593A;
            background: white;
            box-shadow: 0 0 0 3px rgba(200, 89, 58, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .phone-group {
            display: flex;
            gap: 12px;
        }

        .phone-group select {
            width: 100px;
        }

        .phone-group input {
            flex: 1;
        }

        .btn-save {
            width: 100%;
            background: #C8593A;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-save:hover {
            background: #A8432A;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(200, 89, 58, 0.3);
        }

        .error-msg {
            background: #FEE2E2;
            color: #DC2626;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .success-msg {
            background: #DCFCE7;
            color: #16A34A;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        @media (max-width: 600px) {
            .navbar {
                padding: 15px 20px;
            }
            
            .card {
                padding: 25px;
            }
            
            .phone-group {
                flex-direction: column;
            }
            
            .phone-group select {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="batik-bg"></div>

<nav class="navbar">
    <div class="logo">RentBudaya</div>
    <div class="nav-right">
        <a href="dashboard_customer.html">Beranda</a>
        <div class="profile-dropdown">
            <button class="profile-btn">
                <i class="fas fa-user-circle"></i> Profil ▾
            </button>
            <div class="profile-menu">
                <a href="edit_profil_customer.html">Informasi Akun</a>
                <a href="#" id="logoutBtn" class="logout">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card">
        <div class="header">
            <div class="avatar">
                <i class="fas fa-user"></i>
            </div>
            <h1>Informasi Akun</h1>
        </div>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <form id="editProfileForm">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="nama" placeholder="Masukkan nama lengkap">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="nama@email.com">
            </div>

            <div class="form-group">
                <label>Password Baru</label>
                <input type="password" id="newPassword" placeholder="Kosongkan jika tidak ingin mengganti">
            </div>

            <div class="form-group">
                <label>No. WhatsApp</label>
                <div class="phone-group">
                    <select id="countryCode">
                        <option value="+62">+62 (INA)</option>
                        <option value="+60">+60 (MYS)</option>
                        <option value="+65">+65 (SGP)</option>
                        <option value="+63">+63 (PHL)</option>
                    </select>
                    <input type="tel" id="phone" placeholder="81234567890">
                </div>
            </div>

            <div class="form-group">
                <label>Alamat</label>
                <textarea id="alamat" placeholder="Alamat lengkap..."></textarea>
            </div>

            <button type="submit" class="btn-save">Simpan</button>
        </form>
    </div>
</div>

<script>
    // Cek login
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (!currentUser) {
        window.location.href = 'login.html';
    }

    // Load user data
    function loadUserData() {
        document.getElementById('nama').value = currentUser.nama || '';
        document.getElementById('email').value = currentUser.email || '';
        document.getElementById('alamat').value = currentUser.alamat || '';
        
        // Parse phone if exists
        if (currentUser.phone) {
            const phoneMatch = currentUser.phone.match(/^(\+\d+)(.*)$/);
            if (phoneMatch) {
                document.getElementById('countryCode').value = phoneMatch[1];
                document.getElementById('phone').value = phoneMatch[2];
            }
        }
    }
    loadUserData();

    // Batasi input nomor WhatsApp hanya angka
    document.getElementById('phone').addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function(e) {
        e.preventDefault();
        localStorage.clear();
        window.location.href = 'login.html';
    });

    // Submit form
    document.getElementById('editProfileForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const nama = document.getElementById('nama').value.trim();
        const email = document.getElementById('email').value.trim();
        const newPassword = document.getElementById('newPassword').value;
        const countryCode = document.getElementById('countryCode').value;
        const phone = document.getElementById('phone').value.trim();
        const alamat = document.getElementById('alamat').value.trim();
        
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        if (!nama) {
            errorMsg.textContent = "Nama lengkap wajib diisi!";
            errorMsg.style.display = 'block';
            return;
        }
        
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email || !emailRegex.test(email)) {
            errorMsg.textContent = "Email tidak valid!";
            errorMsg.style.display = 'block';
            return;
        }

        if (!phone) {
            errorMsg.textContent = "Nomor WhatsApp wajib diisi!";
            errorMsg.style.display = 'block';
            return;
        }

        if (!/^\d+$/.test(phone)) {
            errorMsg.textContent = "Nomor WhatsApp hanya boleh berisi angka!";
            errorMsg.style.display = 'block';
            return;
        }

        const fullPhone = countryCode + phone;

        const submitBtn = this.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = "Menyimpan...";

        try {
            const response = await fetch("api/editprofil.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: currentUser.id,
                    nama: nama,
                    email: email,
                    alamat: alamat,
                    phone: fullPhone,
                    password_baru: newPassword
                })
            });

            const result = await response.json();

            if (result.success) {
                // Update localStorage
                const updatedUser = { ...currentUser, nama, email, alamat, phone: fullPhone };
                localStorage.setItem('currentUser', JSON.stringify(updatedUser));
                
                successMsg.textContent = "✅ Profil berhasil diperbarui!";
                successMsg.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = 'dashboard_customer.html';
                }, 1500);
            } else {
                errorMsg.textContent = result.message;
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            console.error("Error:", error);
            errorMsg.textContent = "Terjadi kesalahan: " + error.message;
            errorMsg.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
        }
    });
</script>

</body>
</html>
