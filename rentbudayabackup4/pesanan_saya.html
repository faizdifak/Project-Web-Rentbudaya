<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Saya - RentBudaya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FDF8F2;
            position: relative;
            min-height: 100vh;
        }

        .batik-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.04"><path fill="none" stroke="%23C8593A" stroke-width="0.8" d="M20,20 L30,15 L40,20 L50,15 L60,20 L70,15 L80,20 M20,30 L30,25 L40,30 L50,25 L60,30 L70,25 L80,30 M20,40 L30,35 L40,40 L50,35 L60,40 L70,35 L80,40 M20,50 L30,45 L40,50 L50,45 L60,50 L70,45 L80,50 M20,60 L30,55 L40,60 L50,55 L60,60 L70,55 L80,60 M20,70 L30,65 L40,70 L50,65 L60,70 L70,65 L80,70 M20,80 L30,75 L40,80 L50,75 L60,80 L70,75 L80,80"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: -1;
        }

        .navbar {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #C8593A 0%, #8B3A2A 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            font-size: 14px;
            color: #8B7B6F;
            cursor: pointer;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: #C8593A;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 40px;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #2C1A0E;
        }

        .header p {
            font-size: 14px;
            color: #A89888;
            margin-top: 5px;
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .order-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .order-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #F0E8E0;
        }

        .order-number {
            font-size: 14px;
            font-weight: 600;
            color: #C8593A;
        }

        .order-date {
            font-size: 12px;
            color: #A89888;
        }

        .order-status {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-confirmed {
            background: #4CAF50;
            color: white;
        }

        .status-pending {
            background: #FF9800;
            color: white;
        }

        .status-processing {
            background: #2196F3;
            color: white;
        }

        .order-body {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .order-image {
            width: 80px;
            height: 80px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            background-color: #E8E0D8;
        }

        .order-details {
            flex: 1;
        }

        .order-product-name {
            font-size: 16px;
            font-weight: 600;
            color: #2C1A0E;
            margin-bottom: 5px;
        }

        .order-store {
            font-size: 12px;
            color: #A89888;
            margin-bottom: 8px;
        }

        .order-info-row {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-size: 13px;
            color: #6B5B4F;
        }

        .order-total {
            font-weight: 700;
            color: #C8593A;
        }

        .btn-view {
            background: #C8593A;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-view:hover {
            background: #A8432A;
        }

        .empty-orders {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 24px;
        }

        .empty-orders i {
            font-size: 64px;
            color: #E8E0D8;
            margin-bottom: 20px;
        }

        .empty-orders h3 {
            font-size: 20px;
            color: #2C1A0E;
            margin-bottom: 10px;
        }

        .empty-orders p {
            color: #A89888;
            margin-bottom: 25px;
        }

        .btn-shop {
            background: #C8593A;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .navbar {
                padding: 15px 20px;
            }
            .container {
                padding: 0 20px;
            }
            .order-body {
                flex-direction: column;
            }
            .order-image {
                width: 100%;
                height: 150px;
            }
        }
    </style>
</head>
<body>

<div class="batik-bg"></div>

<nav class="navbar">
    <div class="logo">RentBudaya</div>
    <button class="back-btn" onclick="window.location.href='dashboard_customer.html'">
        <i class="fas fa-arrow-left"></i> Kembali
    </button>
</nav>

<div class="container">
    <div class="header">
        <h1>Pesanan Saya</h1>
        <p>Riwayat pesanan Anda</p>
    </div>

    <div id="ordersContainer"></div>
</div>

<script>
    // Cek login
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (!currentUser) {
        window.location.href = 'login.html';
    }

    function getOrders() {
        const orders = localStorage.getItem('userOrders');
        return orders ? JSON.parse(orders) : [];
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        const d = new Date(dateStr);
        return String(d.getDate()).padStart(2, '0') + '/' + 
               String(d.getMonth() + 1).padStart(2, '0') + '/' + 
               d.getFullYear();
    }

    function getStatusText(status) {
        switch(status) {
            case 'confirmed': return 'Pembayaran Dikonfirmasi';
            case 'pending': return 'Menunggu Validasi';
            case 'processing': return 'Diproses';
            case 'ready': return 'Siap Diambil';
            case 'menunggu_pembayaran': return 'Menunggu Validasi';
            case 'pembayaran_dikonfirmasi': return 'Pembayaran Dikonfirmasi';
            case 'diproses': return 'Diproses';
            case 'siap_diambil': return 'Siap Diambil';
            case 'dikembalikan': return 'Dikembalikan';
            case 'selesai': return 'Selesai';
            case 'dibatalkan': return 'Dibatalkan';
            default: return status;
        }
    }

    function getStatusClass(status) {
        switch(status) {
            case 'confirmed':
            case 'pembayaran_dikonfirmasi':
            case 'selesai':
                return 'status-confirmed';
            case 'pending':
            case 'menunggu_pembayaran':
                return 'status-pending';
            case 'processing':
            case 'diproses':
            case 'siap_diambil':
            case 'ready':
                return 'status-processing';
            default:
                return 'status-confirmed';
        }
    }

    function viewOrderDetail(order) {
        localStorage.setItem('currentOrder', JSON.stringify(order));
        localStorage.setItem('orderNumber', order.nomor_pesanan);
        window.location.href = 'detail_pesanan.html';
    }

    function renderOrders(ordersList) {
        const orders = ordersList || getOrders();
        const container = document.getElementById('ordersContainer');
        
        if (orders.length === 0) {
            container.innerHTML = `
                <div class="empty-orders">
                    <i class="fas fa-receipt"></i>
                    <h3>Belum Ada Pesanan</h3>
                    <p>Anda belum memiliki riwayat pesanan. Yuk, sewa pakaian adat favorit Anda!</p>
                    <button class="btn-shop" onclick="window.location.href='dashboard_customer.html'">Mulai Belanja</button>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <div class="orders-list">
                ${orders.map(order => {
                    const imageUrl = order.product?.gambar ? 
                        `Assets/image/${order.product.gambar}` : 
                        'https://placehold.co/80x80/E8E0D8/C8593A?text=Produk';
                    
                    return `
                        <div class="order-card" onclick="viewOrderDetail(${JSON.stringify(order).replace(/"/g, '&quot;')})">
                            <div class="order-header">
                                <span class="order-number">${order.nomor_pesanan || 'RB' + Date.now().toString().slice(-8)}</span>
                                <div>
                                    <span class="order-status ${getStatusClass(order.status || 'confirmed')}">${getStatusText(order.status || 'confirmed')}</span>
                                    <span class="order-date" style="margin-left: 10px;">${formatDate(order.paymentDate || order.tanggal_pesan)}</span>
                                </div>
                            </div>
                            <div class="order-body">
                                <div class="order-image" style="background-image: url('${imageUrl}'); cursor: pointer;" onclick="event.stopPropagation(); window.goToProductDetail(${JSON.stringify(order.product).replace(/"/g, '&quot;')})"></div>
                                <div class="order-details">
                                    <div class="order-product-name" style="cursor: pointer; text-decoration: underline;" onclick="event.stopPropagation(); window.goToProductDetail(${JSON.stringify(order.product).replace(/"/g, '&quot;')})">${order.product?.nama || order.product_name || 'Produk'}</div>
                                    <div class="order-store"><i class="fas fa-store"></i> ${order.store_name || 'Toko'}</div>
                                    <div class="order-info-row">
                                        <span>${order.size || 'M'}</span>
                                        <span>${order.color || 'Hitam'}</span>
                                        <span>${order.model || 'Pria'}</span>
                                    </div>
                                    <div class="order-info-row">
                                        <span>${formatDate(order.startDate)} - ${formatDate(order.endDate)}</span>
                                        <span>(${order.duration || 1} Hari)</span>
                                    </div>
                                    <div class="order-total">Total: Rp ${(order.total || 0).toLocaleString('id-ID')}</div>
                                    <button class="btn-view" onclick="event.stopPropagation(); viewOrderDetail(${JSON.stringify(order).replace(/"/g, '&quot;')})">Lihat Detail</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }

    async function loadOrdersFromDB() {
        const container = document.getElementById('ordersContainer');
        container.innerHTML = '<div style="text-align:center; padding:50px; color:#A89888;"><i class="fas fa-spinner fa-pulse"></i> Memuat riwayat pesanan...</div>';
        
        try {
            const res = await fetch(`api/pesanan.php?user_id=${currentUser.id}`);
            const json = await res.json();
            
            if (json.success && json.data) {
                const mappedOrders = json.data.map(order => ({
                    nomor_pesanan: order.nomor_pesanan,
                    tanggal_pesan: order.created_at,
                    paymentDate: order.created_at,
                    status: order.status,
                    product: {
                        id: order.produk_id,
                        nama: order.nama_produk,
                        gambar: order.gambar
                    },
                    store_name: order.nama_toko,
                    size: order.ukuran,
                    color: order.warna,
                    model: order.model,
                    startDate: order.tanggal_mulai,
                    endDate: order.tanggal_selesai,
                    duration: order.durasi_hari,
                    total: parseFloat(order.total_harga)
                }));
                
                localStorage.setItem('userOrders', JSON.stringify(mappedOrders));
                renderOrders(mappedOrders);
            } else {
                renderOrders(getOrders());
            }
        } catch (e) {
            console.error(e);
            renderOrders(getOrders());
        }
    }

    function goToProductDetail(product) {
        if (!product) return;
        const enrichedProduct = {
            id: product.id,
            nama: product.nama,
            gambar: product.gambar,
            ukuran: ['S', 'M', 'L', 'XL', 'XXL'],
            model: ['Pria', 'Wanita'],
            warna: ['Hitam', 'Biru', 'Hijau']
        };
        localStorage.setItem('selectedProduct', JSON.stringify(enrichedProduct));
        window.location.href = 'detail_produk.html';
    }

    // Make functions global
    window.viewOrderDetail = viewOrderDetail;
    window.goToProductDetail = goToProductDetail;

    // Initial render
    loadOrdersFromDB();
</script>

</body>
</html>
