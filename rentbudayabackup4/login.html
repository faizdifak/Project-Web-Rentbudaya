<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Customer - RentBudaya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FDF8F2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .batik-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.04"><path fill="none" stroke="%23C8593A" stroke-width="0.8" d="M20,20 L30,15 L40,20 L50,15 L60,20 L70,15 L80,20 M20,30 L30,25 L40,30 L50,25 L60,30 L70,25 L80,30 M20,40 L30,35 L40,40 L50,35 L60,40 L70,35 L80,40 M20,50 L30,45 L40,50 L50,45 L60,50 L70,45 L80,50 M20,60 L30,55 L40,60 L50,55 L60,60 L70,55 L80,60 M20,70 L30,65 L40,70 L50,65 L60,70 L70,65 L80,70 M20,80 L30,75 L40,80 L50,75 L60,80 L70,75 L80,80"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: -1;
        }

        .login-card {
            max-width: 440px;
            width: 90%;
            background: #FFFFFF;
            border-radius: 32px;
            padding: 45px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            font-size: 14px;
            color: #8B7B6F;
            cursor: pointer;
            margin-bottom: 30px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: #C8593A;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #C8593A 0%, #8B3A2A 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: #A89888;
            letter-spacing: 2px;
        }

        .header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #2C1A0E;
            margin-top: 20px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            color: #8B7B6F;
        }

        .field {
            margin-bottom: 22px;
        }

        .field label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2C1A0E;
            margin-bottom: 8px;
        }

        .field input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E8E0D8;
            border-radius: 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            background: #FDF8F2;
        }

        .field input:focus {
            outline: none;
            border-color: #C8593A;
            background: white;
            box-shadow: 0 0 0 3px rgba(200, 89, 58, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            accent-color: #C8593A;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 14px;
            color: #6B5B4F;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            background: #C8593A;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: #A8432A;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(200, 89, 58, 0.3);
        }

        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: #8B7B6F;
        }

        .footer a {
            color: #C8593A;
            text-decoration: none;
            font-weight: 600;
        }

        .error-msg {
            background: #FEE2E2;
            color: #DC2626;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
            }
            
            .header h2 {
                font-size: 24px;
            }
            
            .field input {
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>

<div class="batik-bg"></div>

<div class="login-card">
    <button class="back-btn" onclick="window.location.href='pilih_role.html'">
        <i class="fas fa-arrow-left"></i>
        Back
    </button>

    <div class="header">
        <div class="logo">RentBudaya</div>
        <div class="subtitle">Penyewaan Pakaian Daerah</div>
        <h2>Selamat Datang</h2>
        <p>Masuk ke akun Anda</p>
    </div>

    <div id="errorMsg" class="error-msg"></div>

    <form id="loginForm">
        <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="masukkan email..." required>
        </div>

        <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="masukkan password..." required>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="rememberPassword">
            <label for="rememberPassword">Simpan Password</label>
        </div>

        <button type="submit" class="btn-login">Masuk</button>
    </form>

    <div class="footer">
        Belum punya akun? <a href="daftar_customer.html">Daftar</a>
    </div>
</div>

<script>
    // Load saved email if any
    const savedEmail = localStorage.getItem('savedEmail');
    if (savedEmail) {
        document.getElementById('email').value = savedEmail;
        document.getElementById('rememberPassword').checked = true;
        
        const savedPassword = localStorage.getItem('savedPassword');
        if (savedPassword) {
            document.getElementById('password').value = savedPassword;
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const remember = document.getElementById('rememberPassword').checked;
        const errorMsg = document.getElementById('errorMsg');

        errorMsg.style.display = 'none';
        errorMsg.textContent = '';

        if (!email || !password) {
            errorMsg.textContent = 'Email dan password wajib diisi!';
            errorMsg.style.display = 'block';
            return;
        }

        try {
            const res = await fetch('api/login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const json = await res.json();

            if (json.success) {
                // Save credentials if remember checked
                if (remember) {
                    localStorage.setItem('savedEmail', email);
                    localStorage.setItem('savedPassword', password);
                } else {
                    localStorage.removeItem('savedEmail');
                    localStorage.removeItem('savedPassword');
                }

                // Clear sessional/transactional keys from previous logins
                localStorage.removeItem('userOrders');
                localStorage.removeItem('wishlist');
                localStorage.removeItem('selectedProduct');
                localStorage.removeItem('rentalData');
                localStorage.removeItem('currentOrder');
                localStorage.removeItem('orderNumber');

                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', JSON.stringify(json.user));
                
                if (json.user.role === 'seller') {
                    window.location.href = 'dashboard_penjual.html';
                } else {
                    window.location.href = 'dashboard_customer.html';
                }
            } else {
                if (json.message === 'Email belum terdaftar') {
                    errorMsg.textContent = 'Email belum terdaftar';
                } else if (json.message === 'Password salah') {
                    errorMsg.textContent = 'Password salah';
                } else {
                    errorMsg.textContent = json.message;
                }
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            console.error(err);
            errorMsg.textContent = 'Tidak bisa terhubung ke server';
            errorMsg.style.display = 'block';
        }
    });
</script>

</body>
</html>
