<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - RentBudaya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FDF8F2;
            position: relative;
            min-height: 100vh;
        }

        .batik-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.04"><path fill="none" stroke="%23C8593A" stroke-width="0.8" d="M20,20 L30,15 L40,20 L50,15 L60,20 L70,15 L80,20 M20,30 L30,25 L40,30 L50,25 L60,30 L70,25 L80,30 M20,40 L30,35 L40,40 L50,35 L60,40 L70,35 L80,40 M20,50 L30,45 L40,50 L50,45 L60,50 L70,45 L80,50 M20,60 L30,55 L40,60 L50,55 L60,60 L70,55 L80,60 M20,70 L30,65 L40,70 L50,65 L60,70 L70,65 L80,70 M20,80 L30,75 L40,80 L50,75 L60,80 L70,75 L80,80"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: -1;
        }

        .navbar {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #C8593A 0%, #8B3A2A 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-icon {
            position: relative;
            cursor: pointer;
            font-size: 22px;
            color: #C8593A;
        }

        .wishlist-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #C8593A;
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 20px;
        }

        .profile-avatar {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            position: relative;
        }

        .avatar-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #C8593A, #E8A87C);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .profile-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: white;
            border-radius: 16px;
            width: 180px;
            padding: 8px 0;
            display: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .profile-dropdown a {
            display: block;
            padding: 10px 20px;
            text-decoration: none;
            color: #2C1A0E;
            font-size: 14px;
        }

        .profile-dropdown a:hover {
            background: #FDF8F2;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 40px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            font-size: 14px;
            color: #8B7B6F;
            cursor: pointer;
            margin-bottom: 30px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: #C8593A;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #2C1A0E;
        }

        .header p {
            font-size: 14px;
            color: #A89888;
            margin-top: 5px;
        }

        .wishlist-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .wishlist-card {
            background: white;
            border-radius: 20px;
            display: flex;
            gap: 20px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .wishlist-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .wishlist-image {
            width: 120px;
            height: 120px;
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            background-color: #E8E0D8;
        }

        .wishlist-info {
            flex: 1;
        }

        .wishlist-store {
            font-size: 12px;
            color: #A89888;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .wishlist-title {
            font-size: 18px;
            font-weight: 600;
            color: #2C1A0E;
            margin-bottom: 8px;
        }

        .wishlist-price {
            font-size: 20px;
            font-weight: 700;
            color: #C8593A;
            margin: 10px 0;
        }

        .wishlist-price small {
            font-size: 12px;
            font-weight: 400;
            color: #A89888;
        }

        .wishlist-stock {
            font-size: 12px;
            color: #4CAF50;
            margin-bottom: 12px;
        }

        .wishlist-actions {
            display: flex;
            gap: 12px;
        }

        .btn-rent {
            background: #C8593A;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-rent:hover {
            background: #A8432A;
        }

        .btn-remove {
            background: none;
            border: 1px solid #E8E0D8;
            color: #DC2626;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-remove:hover {
            background: #FEE2E2;
            border-color: #DC2626;
        }

        .empty-wishlist {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 24px;
        }

        .empty-wishlist i {
            font-size: 64px;
            color: #E8E0D8;
            margin-bottom: 20px;
        }

        .empty-wishlist h3 {
            font-size: 20px;
            color: #2C1A0E;
            margin-bottom: 10px;
        }

        .empty-wishlist p {
            color: #A89888;
            margin-bottom: 25px;
        }

        .btn-shop {
            background: #C8593A;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .container {
                padding: 0 20px;
            }
            .wishlist-card {
                flex-direction: column;
            }
            .wishlist-image {
                width: 100%;
                height: 180px;
            }
            .wishlist-actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

<div class="batik-bg"></div>

<nav class="navbar">
    <div class="logo">RentBudaya</div>
    <div class="nav-right">
        <div class="nav-icon" onclick="window.location.href='wishlist.html'">
            <i class="fas fa-heart"></i>
            <span class="wishlist-badge" id="wishlistCount">0</span>
        </div>
        <div class="profile-avatar" id="profileAvatar">
            <div class="avatar-img" id="avatarImg">U</div>
            <div class="profile-dropdown" id="profileDropdown">
                <a href="edit_profil_customer.html">Informasi Akun</a>
                <a href="wishlist.html">Wishlist</a>
                <a href="#" id="logoutBtn" class="logout">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <button class="back-btn" onclick="window.location.href='dashboard_customer.html'">
        <i class="fas fa-arrow-left"></i> Kembali
    </button>

    <div class="header">
        <h1>Wishlist Kamu ❤️</h1>
        <p>Produk yang kamu sukai akan tersimpan di sini</p>
    </div>

    <div id="wishlistContainer"></div>
</div>

<script>
    // Cek login
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (!currentUser) {
        window.location.href = 'login.html';
    }

    document.getElementById('avatarImg').innerHTML = (currentUser.nama || 'U').charAt(0).toUpperCase();

    function getWishlist() {
        const wishlist = localStorage.getItem('wishlist');
        return wishlist ? JSON.parse(wishlist) : [];
    }

    function saveWishlist(wishlist) {
        localStorage.setItem('wishlist', JSON.stringify(wishlist));
        updateWishlistCount();
        renderWishlist();
    }

    function updateWishlistCount() {
        const wishlist = getWishlist();
        const count = wishlist.length;
        const badge = document.getElementById('wishlistCount');
        if (badge) {
            badge.textContent = count;
        }
    }

    function removeFromWishlist(productId) {
        let wishlist = getWishlist();
        wishlist = wishlist.filter(item => item.id !== productId);
        saveWishlist(wishlist);
        showToast('🗑️ Dihapus dari Wishlist');
    }

    function rentProduct(product) {
        const enrichedProduct = {
            ...product,
            ukuran: ['S', 'M', 'L', 'XL', 'XXL'],
            model: ['Pria', 'Wanita'],
            warna: ['Hitam', 'Biru', 'Hijau']
        };
        localStorage.setItem('selectedProduct', JSON.stringify(enrichedProduct));
        window.location.href = 'detail_produk.html';
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#2C1A0E';
        toast.style.color = 'white';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '50px';
        toast.style.fontSize = '14px';
        toast.style.zIndex = '1000';
        toast.style.animation = 'fadeInOut 2s ease';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function renderWishlist() {
        const wishlist = getWishlist();
        const container = document.getElementById('wishlistContainer');
        
        if (wishlist.length === 0) {
            container.innerHTML = `
                <div class="empty-wishlist">
                    <i class="far fa-heart"></i>
                    <h3>Wishlist Masih Kosong</h3>
                    <p>Yuk, cari dan simpan produk favoritmu!</p>
                    <button class="btn-shop" onclick="window.location.href='dashboard_customer.html'">Mulai Belanja</button>
                </div>
            `;
            return;
        }
        
        const stock = Math.floor(Math.random() * 10) + 3;
        
        container.innerHTML = `
            <div class="wishlist-grid">
                ${wishlist.map(item => {
                    const imageUrl = item.gambar ? `Assets/image/${item.gambar}` : 'https://placehold.co/120x120/E8E0D8/C8593A?text=Produk';
                    return `
                        <div class="wishlist-card">
                            <div class="wishlist-image" style="background-image: url('${imageUrl}')"></div>
                            <div class="wishlist-info">
                                <div class="wishlist-store">
                                    <i class="fas fa-store"></i> ${item.store_name || 'Toko'}
                                </div>
                                <div class="wishlist-title">${item.nama || 'Produk'}</div>
                                <div class="wishlist-price">
                                    Rp ${Number(item.harga_per_hari || 0).toLocaleString('id-ID')}
                                    <small>/hari</small>
                                </div>
                                <div class="wishlist-stock">
                                    <i class="fas fa-box"></i> Tersedia ${stock}
                                </div>
                                <div class="wishlist-actions">
                                    <button class="btn-rent" onclick="rentProduct(${JSON.stringify(item).replace(/"/g, '&quot;')})">Sewa Sekarang</button>
                                    <button class="btn-remove" onclick="removeFromWishlist(${item.id})">Hapus</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }

    // Profile dropdown
    const profileAvatar = document.getElementById('profileAvatar');
    const profileDropdown = document.getElementById('profileDropdown');
    
    profileAvatar.addEventListener('click', function(e) {
        e.stopPropagation();
        profileDropdown.style.display = profileDropdown.style.display === 'block' ? 'none' : 'block';
    });
    
    document.addEventListener('click', function() {
        profileDropdown.style.display = 'none';
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function(e) {
        e.preventDefault();
        localStorage.clear();
        window.location.href = 'login.html';
    });

    // Make functions global
    window.rentProduct = rentProduct;
    window.removeFromWishlist = removeFromWishlist;

    // CSS animation
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
    `;
    document.head.appendChild(style);

    // Initial render
    renderWishlist();
    updateWishlistCount();
</script>

</body>
</html>
