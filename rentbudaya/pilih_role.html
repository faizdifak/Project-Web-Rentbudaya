<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Role - RentBudaya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FDF8F2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Background Batik Pattern */
        .batik-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.04"><path fill="none" stroke="%23C8593A" stroke-width="0.8" d="M20,20 L30,15 L40,20 L50,15 L60,20 L70,15 L80,20 M20,30 L30,25 L40,30 L50,25 L60,30 L70,25 L80,30 M20,40 L30,35 L40,40 L50,35 L60,40 L70,35 L80,40 M20,50 L30,45 L40,50 L50,45 L60,50 L70,45 L80,50 M20,60 L30,55 L40,60 L50,55 L60,60 L70,55 L80,60 M20,70 L30,65 L40,70 L50,65 L60,70 L70,65 L80,70 M20,80 L30,75 L40,80 L50,75 L60,80 L70,75 L80,80"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 500px;
            width: 90%;
            background: #FFFFFF;
            border-radius: 32px;
            padding: 40px 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            margin: 20px;
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            font-size: 16px;
            color: #8B7B6F;
            cursor: pointer;
            margin-bottom: 30px;
            transition: color 0.3s;
            font-weight: 500;
        }

        .back-btn:hover {
            color: #C8593A;
        }

        .back-btn i {
            font-size: 14px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #C8593A 0%, #8B3A2A 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 14px;
            color: #A89888;
            letter-spacing: 2px;
        }

        .header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #2C1A0E;
            margin-top: 20px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #8B7B6F;
        }

        /* Role Cards */
        .role-cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .role-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px 28px;
            background: #FDF8F2;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .role-card:hover {
            transform: translateX(5px);
            border-color: rgba(200, 89, 58, 0.3);
            background: #FFF9F5;
        }

        .role-card.selected {
            border-color: #C8593A;
            background: #FFF5EE;
            box-shadow: 0 8px 20px rgba(200, 89, 58, 0.15);
        }

        .role-icon {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #C8593A;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .role-card.selected .role-icon {
            background: #C8593A;
            color: white;
        }

        .role-info {
            flex: 1;
        }

        .role-info h3 {
            font-size: 20px;
            font-weight: 700;
            color: #2C1A0E;
            margin-bottom: 6px;
        }

        .role-info p {
            font-size: 13px;
            color: #A89888;
            line-height: 1.4;
        }

        .check-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #E8E0D8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            transition: all 0.3s;
        }

        .role-card.selected .check-icon {
            background: #C8593A;
        }

        /* Button */
        .btn-continue {
            width: 100%;
            background: #C8593A;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .btn-continue:hover {
            background: #A8432A;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(200, 89, 58, 0.3);
        }

        .btn-continue:disabled {
            background: #D4C4B5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: #A89888;
        }

        .footer a {
            color: #C8593A;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            .role-card {
                padding: 18px 20px;
            }
            
            .role-icon {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
            
            .role-info h3 {
                font-size: 18px;
            }
            
            .header h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="batik-bg"></div>

<div class="container">
    <button class="back-btn" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-left"></i>
        Back
    </button>

    <div class="header">
        <div class="logo">RentBudaya</div>
        <div class="subtitle">Penyewaan Pakaian Daerah</div>
        <h2>Mau Sebagai Apa?</h2>
        <p>Pilih Role untuk melanjutkan</p>
    </div>

    <div class="role-cards">
        <div class="role-card" data-role="seller" onclick="selectRole('seller')">
            <div class="role-icon">
                <i class="fas fa-store"></i>
            </div>
            <div class="role-info">
                <h3>Penjual (Toko)</h3>
                <p>Kelola produk, terima & proses pesanan sewa</p>
            </div>
            <div class="check-icon">
                <i class="fas fa-check"></i>
            </div>
        </div>

        <div class="role-card" data-role="customer" onclick="selectRole('customer')">
            <div class="role-icon">
                <i class="fas fa-user"></i>
            </div>
            <div class="role-info">
                <h3>Penyewa</h3>
                <p>Cari & sewa pakaian adat dari berbagai toko</p>
            </div>
            <div class="check-icon">
                <i class="fas fa-check"></i>
            </div>
        </div>
    </div>

    <button class="btn-continue" id="continueBtn" disabled onclick="continueToLogin()">
        Lanjutkan
    </button>

    <div class="footer">
      
</div>

<script>
    let selectedRole = null;

    function selectRole(role) {
        selectedRole = role;
        
        // Update UI selected
        document.querySelectorAll('.role-card').forEach(card => {
            card.classList.remove('selected');
        });
        document.querySelector(`.role-card[data-role="${role}"]`).classList.add('selected');
        
        // Enable button
        const continueBtn = document.getElementById('continueBtn');
        continueBtn.disabled = false;
        
        // Store selected role
        localStorage.setItem('selectedRole', role);
    }

    function continueToLogin() {
        if (!selectedRole) return;
        
        if (selectedRole === 'seller') {
            window.location.href = 'login_penjual.html';
        } else {
            window.location.href = 'login.html';
        }
    }
</script>

</body>
</html>
