<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk - RentBudaya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FDF8F2;
            position: relative;
            min-height: 100vh;
        }

        .batik-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.04"><path fill="none" stroke="%23C8593A" stroke-width="0.8" d="M20,20 L30,15 L40,20 L50,15 L60,20 L70,15 L80,20 M20,30 L30,25 L40,30 L50,25 L60,30 L70,25 L80,30 M20,40 L30,35 L40,40 L50,35 L60,40 L70,35 L80,40 M20,50 L30,45 L40,50 L50,45 L60,50 L70,45 L80,50 M20,60 L30,55 L40,60 L50,55 L60,60 L70,55 L80,60 M20,70 L30,65 L40,70 L50,65 L60,70 L70,65 L80,70 M20,80 L30,75 L40,80 L50,75 L60,80 L70,75 L80,80"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: -1;
        }

        /* Navbar */
        .navbar {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #C8593A 0%, #8B3A2A 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-icon {
            position: relative;
            cursor: pointer;
            font-size: 22px;
            color: #6B5B4F;
            transition: color 0.3s;
        }

        .nav-icon:hover {
            color: #C8593A;
        }

        .wishlist-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #C8593A;
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 20px;
            min-width: 18px;
            text-align: center;
        }

        .profile-avatar {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            position: relative;
        }

        .avatar-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #C8593A, #E8A87C);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .profile-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: white;
            border-radius: 16px;
            width: 180px;
            padding: 8px 0;
            display: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .profile-dropdown a {
            display: block;
            padding: 10px 20px;
            text-decoration: none;
            color: #2C1A0E;
            font-size: 14px;
        }

        .profile-dropdown a:hover {
            background: #FDF8F2;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            font-size: 14px;
            color: #8B7B6F;
            cursor: pointer;
            margin-bottom: 30px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: #C8593A;
        }

        /* Detail Content */
        .detail-content {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* Product Image Section */
        .product-image-section {
            flex: 1;
            min-width: 300px;
        }

        .main-image {
            width: 100%;
            height: 400px;
            background-size: cover;
            background-position: center;
            border-radius: 24px;
            position: relative;
            background-color: #E8E0D8;
        }

        .like-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .like-btn i {
            font-size: 24px;
            color: #A89888;
            transition: all 0.3s;
        }

        .like-btn.liked i {
            color: #DC2626;
        }

        .like-btn:hover {
            transform: scale(1.05);
        }

        /* Product Info Section */
        .product-info-section {
            flex: 1;
            min-width: 350px;
        }

        .store-name {
            font-size: 14px;
            color: #A89888;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .product-title {
            font-size: 28px;
            font-weight: 700;
            color: #2C1A0E;
            margin-bottom: 12px;
        }

        .product-price {
            font-size: 32px;
            font-weight: 800;
            color: #C8593A;
            margin-bottom: 20px;
        }

        .product-price small {
            font-size: 14px;
            font-weight: 400;
            color: #A89888;
        }

        .address {
            background: #FDF8F2;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .address i {
            color: #C8593A;
            font-size: 18px;
        }

        .address p {
            font-size: 14px;
            color: #6B5B4F;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #2C1A0E;
            margin: 25px 0 15px;
        }

        .description {
            background: #FDF8F2;
            padding: 18px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
            color: #6B5B4F;
        }

        /* Size & Model Table */
        .info-table {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: #FDF8F2;
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-label {
            font-size: 12px;
            color: #A89888;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #2C1A0E;
        }

        .model-tags, .size-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .model-tag, .size-tag {
            padding: 6px 16px;
            background: white;
            border: 1px solid #E8E0D8;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .model-tag.active, .size-tag.active {
            background: #C8593A;
            color: white;
            border-color: #C8593A;
        }

        /* Date Selection */
        .date-section {
            background: #FDF8F2;
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .date-row {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .date-field {
            flex: 1;
        }

        .date-field label {
            display: block;
            font-size: 12px;
            color: #A89888;
            margin-bottom: 8px;
        }

        .date-field input {
            width: 100%;
            padding: 12px;
            border: 1px solid #E8E0D8;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            background: white;
        }

        .rent-btn {
            width: 100%;
            background: #C8593A;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .rent-btn:hover {
            background: #A8432A;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(200, 89, 58, 0.3);
        }

        .error-msg {
            background: #FEE2E2;
            color: #DC2626;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }
            .container {
                padding: 0 20px;
            }
            .product-title {
                font-size: 24px;
            }
            .product-price {
                font-size: 28px;
            }
            .main-image {
                height: 300px;
            }
        }
    </style>
</head>
<body>

<div class="batik-bg"></div>

<nav class="navbar">
    <div class="logo">RentBudaya</div>
    <div class="nav-right">
        <div class="nav-icon" id="wishlistIcon">
            <i class="far fa-heart"></i>
            <span class="wishlist-badge" id="wishlistCount">0</span>
        </div>
        <div class="profile-avatar" id="profileAvatar">
            <div class="avatar-img" id="avatarImg">U</div>
            <div class="profile-dropdown" id="profileDropdown">
                <a href="edit_profil_customer.html">Informasi Akun</a>
                <a href="wishlist.html">Wishlist</a>
                <a href="#" id="logoutBtn" class="logout">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i> Kembali
    </button>

    <div class="detail-content" id="detailContent">
        <!-- Akan diisi dengan JavaScript -->
    </div>
</div>

<script>
    let product = null;
    let selectedModel = 'Pria';
    let selectedSize = 'M';
    let selectedColor = 'Hitam';
    let isInWishlist = false;


    // Cek login
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (!currentUser) {
        window.location.href = 'login.html';
    }

    // Set avatar
    const displayName = currentUser.nama || 'Customer';
    document.getElementById('avatarImg').innerHTML = displayName.charAt(0).toUpperCase();

    // Load product from localStorage
    function loadProduct() {
        const storedProduct = localStorage.getItem('selectedProduct');
        if (storedProduct) {
            product = JSON.parse(storedProduct);
            
            // Set default selected values based on database values
            if (product.model) {
                selectedModel = Array.isArray(product.model) ? (product.model[0] || 'Pria') : product.model;
            }
            if (product.ukuran) {
                selectedSize = Array.isArray(product.ukuran) ? (product.ukuran[0] || 'M') : product.ukuran;
            }
            if (product.warna) {
                selectedColor = Array.isArray(product.warna) ? (product.warna[0] || 'Hitam') : product.warna;
            } else if (product.varian && product.varian.warna && product.varian.warna.length) {
                selectedColor = product.varian.warna[0];
            }

            // Normalisasi agar warna selalu merupakan array yang siap di-render
            const WARNA_FALLBACK = ['Hitam', 'Biru', 'Hijau'];
            const ensureArray = (val, fallback) => Array.isArray(val) && val.length ? val : fallback;
            product.warna = ensureArray(product.warna || product.varian?.warna, WARNA_FALLBACK);

            renderDetail();
            checkWishlistStatus();
            updateWishlistCount();
        } else {
            // Dummy data if no product selected
            product = {
                id: 1,
                nama: 'Kebaya Beskap Solo',
                harga_per_hari: 41000,
                store_name: 'Toko Budaya',
                address: 'Jl. Rakyat Merdeka no 16, Kota Magelang',
                description: 'Kebaya Beludru dan Beskap Jawa bernuansa hitam emas. Elegan, klasik, dan sangat cocok untuk acara pernikahan atau prosesi adat formal.',
                ukuran: ['S', 'M', 'L', 'XL', 'XXL'],
                model: ['Pria', 'Wanita'],
                gambar: 'imageproduk.jpeg'
            };
            renderDetail();
        }
    }

    function getImageByColor(color) {
        // Samakan dengan gambar di halaman sewa
        switch (color) {
            case 'Biru':
                return 'Assets/image/imagebiru.jpeg';
            case 'Hijau':
                return 'Assets/image/imagehijau.jpeg';
            case 'Hitam':
            default:
                return 'Assets/image/imageproduk.jpeg';
        }
    }

    function renderDetail() {
        const container = document.getElementById('detailContent');
        const imageUrl = product.gambar ? getImageByColor(selectedColor) : 'https://placehold.co/500x400/E8E0D8/C8593A?text=Produk';
        
        const likedClass = isInWishlist ? 'liked' : '';
        const heartIcon = isInWishlist ? 'fas fa-heart' : 'far fa-heart';
        
        container.innerHTML = `
            <div class="product-image-section">
                <div class="main-image" style="background-image: url('${imageUrl}')">
                    <div class="like-btn ${likedClass}" onclick="toggleWishlist(event)">
                        <i class="${heartIcon}"></i>
                    </div>
                </div>
            </div>
            <div class="product-info-section">
                <div class="store-name">
                    <i class="fas fa-store"></i> ${product.store_name || 'Toko'}
                </div>

                <h1 class="product-title">${(product.nama || 'Produk').replace(/\b(Adat|Ukuran|L|M|S|XL|XXL)\b/g, '').trim() || (product.nama || 'Produk')}</h1>

                <div class="product-price">
                    Rp ${Number(product.harga_per_hari || 0).toLocaleString('id-ID')}
                    <small>/hari</small>
                </div>
                <div class="address">
                    <i class="fas fa-map-marker-alt"></i>
                    <p>${product.address || product.alamat || 'Jl. Rakyat Merdeka no 16, Kota Magelang'}</p>
                </div>

                <h3 class="section-title">Deskripsi Produk</h3>
                <div class="description">
                    ${product.description || product.deskripsi || 'Kebaya Beludru dan Beskap Jawa bernuansa hitam emas. Elegan, klasik, dan sangat cocok untuk acara pernikahan atau prosesi adat formal.'}
                </div>

                <div class="info-table">
                    <div class="info-item">
                        <div class="info-label">Model</div>
                        <div class="model-tags" id="modelTags">
                            ${['Pria', 'Wanita'].map(m => 
                                `<span class="model-tag ${selectedModel === m ? 'active' : ''}" onclick="selectModel('${m}')">${m}</span>`
                            ).join('')}
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Warna</div>
                        <div class="model-tags" id="colorTags">
                            ${(product.warna || ['Hitam', 'Biru', 'Hijau']).map(c => 
                                `<span class="model-tag ${selectedColor === c ? 'active' : ''}" style="margin:0 6px;" onclick="selectColor('${c}')">${c}</span>`
                            ).join('')}
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Size</div>
                        <div class="size-tags" id="sizeTags">
                            ${['S', 'M', 'L', 'XL', 'XXL'].map(s => 
                                `<span class="size-tag ${selectedSize === s ? 'active' : ''}" onclick="selectSize('${s}')">${s}</span>`
                            ).join('')}
                        </div>
                    </div>
                </div>

                <h3 class="section-title">Durasi Sewa</h3>
                <div class="date-section">
                    <div class="date-row">
                        <div class="date-field">
                            <label>Tanggal Mulai</label>
                            <input type="date" id="startDate" min="${getToday()}">
                        </div>
                        <div class="date-field">
                            <label>Tanggal Selesai (maks 3 hari)</label>
                            <input type="date" id="endDate" min="${getToday()}">
                        </div>
                    </div>
                </div>

                <button class="rent-btn" onclick="proceedToRent()">Sewa Sekarang</button>
                <div id="errorMsg" class="error-msg"></div>
            </div>
        `;
    }

    function getToday() {
        return new Date().toISOString().split('T')[0];
    }

    function selectModel(model) {
        selectedModel = model;
        document.querySelectorAll('#modelTags .model-tag').forEach(tag => {
            tag.classList.remove('active');
            if (tag.textContent === model) tag.classList.add('active');
        });
    }

    function selectSize(size) {
        selectedSize = size;
        document.querySelectorAll('#sizeTags .size-tag').forEach(tag => {
            tag.classList.remove('active');
            if (tag.textContent === size) tag.classList.add('active');
        });
    }

    function selectColor(color) {
        selectedColor = color;
        
        // Update main image background
        const mainImage = document.querySelector('.main-image');
        if (mainImage) {
            mainImage.style.backgroundImage = `url('${getImageByColor(color)}')`;
        }
        
        // Update active class for color tags
        const colorTagsContainer = document.getElementById('colorTags');
        if (colorTagsContainer) {
            colorTagsContainer.querySelectorAll('.model-tag').forEach(tag => {
                tag.classList.remove('active');
                if (tag.textContent === color) {
                    tag.classList.add('active');
                }
            });
        }
    }

    // Wishlist functions
    function getWishlist() {
        const wishlist = localStorage.getItem('wishlist');
        return wishlist ? JSON.parse(wishlist) : [];
    }

    function saveWishlist(wishlist) {
        localStorage.setItem('wishlist', JSON.stringify(wishlist));
        updateWishlistCount();
    }

    function checkWishlistStatus() {
        const wishlist = getWishlist();
        isInWishlist = wishlist.some(item => item.id === product.id);
    }

    // Update counts
    function updateWishlistCount() {
        const wishlist = getWishlist();
        const count = wishlist.length;
        const badge = document.getElementById('wishlistCount');
        if (badge) {
            badge.textContent = count;
            badge.style.display = count > 0 ? 'inline-block' : 'none';
        }
    }

    function toggleWishlist(event) {
        event.stopPropagation();
        let wishlist = getWishlist();
        const index = wishlist.findIndex(item => item.id === product.id);
        
        if (index === -1) {
            // Add to wishlist
            wishlist.push({
                id: product.id,
                nama: product.nama,
                harga_per_hari: product.harga_per_hari,
                store_name: product.store_name,
                gambar: product.gambar,
                address: product.address
            });
            isInWishlist = true;
            showToast('✅ Ditambahkan ke Wishlist');
        } else {
            // Remove from wishlist
            wishlist.splice(index, 1);
            isInWishlist = false;
            showToast('🗑️ Dihapus dari Wishlist');
        }
        
        saveWishlist(wishlist);
        
        // Update like button UI
        const likeBtn = document.querySelector('.like-btn');
        const heartIcon = likeBtn?.querySelector('i');
        if (likeBtn && heartIcon) {
            if (isInWishlist) {
                likeBtn.classList.add('liked');
                heartIcon.className = 'fas fa-heart';
            } else {
                likeBtn.classList.remove('liked');
                heartIcon.className = 'far fa-heart';
            }
        }
    }

    function showToast(message) {
        // Simple toast notification
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#2C1A0E';
        toast.style.color = 'white';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '50px';
        toast.style.fontSize = '14px';
        toast.style.zIndex = '1000';
        toast.style.animation = 'fadeInOut 2s ease';
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.remove();
        }, 2000);
    }

    // Rent validation
    function proceedToRent() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const errorMsg = document.getElementById('errorMsg');
        
        errorMsg.style.display = 'none';
        
        if (!startDate) {
            errorMsg.textContent = 'Silakan pilih tanggal mulai sewa!';
            errorMsg.style.display = 'block';
            return;
        }
        
        if (!endDate) {
            errorMsg.textContent = 'Silakan pilih tanggal selesai sewa!';
            errorMsg.style.display = 'block';
            return;
        }
        
        const start = new Date(startDate);
        const end = new Date(endDate);
        const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
        
        if (end < start) {
            errorMsg.textContent = 'Tanggal selesai tidak boleh sebelum tanggal mulai!';
            errorMsg.style.display = 'block';
            return;
        }
        
        if (days > 3) {
            errorMsg.textContent = 'Maksimal sewa adalah 3 hari!';
            errorMsg.style.display = 'block';
            return;
        }
        
        // Save rental data
        const rentalData = {
            product: product,
            model: selectedModel,
            size: selectedSize,
            color: selectedColor,
            startDate: startDate,
            endDate: endDate,
            duration: days,
            total: days * (product.harga_per_hari || 0)
        };
        
        localStorage.setItem('rentalData', JSON.stringify(rentalData));
        window.location.href = 'pembayaran.html';
    }

    function goBack() {
        window.history.back();
    }

    // Profile dropdown
    const profileAvatar = document.getElementById('profileAvatar');
    const profileDropdown = document.getElementById('profileDropdown');
    
    profileAvatar.addEventListener('click', function(e) {
        e.stopPropagation();
        profileDropdown.style.display = profileDropdown.style.display === 'block' ? 'none' : 'block';
    });
    
    document.addEventListener('click', function() {
        profileDropdown.style.display = 'none';
    });

    // Wishlist icon click
    document.getElementById('wishlistIcon').addEventListener('click', function() {
        window.location.href = 'wishlist.html';
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function(e) {
        e.preventDefault();
        localStorage.clear();
        window.location.href = 'login.html';
    });

    // Make functions global
    window.toggleWishlist = toggleWishlist;
    window.selectModel = selectModel;
    window.selectSize = selectSize;
    window.selectColor = selectColor;
    window.proceedToRent = proceedToRent;
    window.goBack = goBack;

    // CSS animation for toast
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
